name: Validate Docker build (bake-action)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate build configuration with Bake
        uses: docker/bake-action@v6
        with:
          files: ./docker-bake.hcl
          targets: validate-build
          push: false